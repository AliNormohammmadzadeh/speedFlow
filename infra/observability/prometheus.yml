global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: platform-api
    metrics_path: /metrics
    static_configs:
      - targets: ["platform-api:8020"]

  - job_name: stream-processor
    static_configs:
      - targets: ["platform-stream-processor:9308"]

  - job_name: crawlee-worker
    static_configs:
      - targets: ["platform-crawlee-worker:9309"]

  - job_name: kafka-lag-exporter
    static_configs:
      - targets: ["kafka-lag-exporter:9110"]
