# Kafka MirrorMaker 2 — cross-region replication for DR (task 4.10).
# Run: connect-mirror-maker mm2.properties
# Replicates topics from the primary region cluster to the DR region cluster
# (active-passive). For active-active, enable both replication flows.

clusters = us, eu

us.bootstrap.servers = kafka-us-broker:9094
eu.bootstrap.servers = kafka-eu-broker:9094

# Primary (us) -> DR (eu)
us->eu.enabled = true
us->eu.topics = raw_stream.*, processed_stream, feedback_metrics

# DR (eu) -> Primary (us): disabled for active-passive; enable for active-active.
eu->us.enabled = false

replication.factor = 3
checkpoints.topic.replication.factor = 3
heartbeats.topic.replication.factor = 3
offset-syncs.topic.replication.factor = 3

# Keep topic names stable across clusters (no source-cluster prefix) so consumers
# fail over cleanly; disable if you need loop protection in active-active.
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

sync.topic.acls.enabled = true
emit.heartbeats.interval.seconds = 5
refresh.topics.interval.seconds = 30
