# MirrorMaker 2 config for the LOCAL DR emulation (single-node brokers).
# Run: connect-mirror-maker mm2.local.properties
clusters = primary, dr

primary.bootstrap.servers = kafka:9092
dr.bootstrap.servers = kafka-dr:9092

primary->dr.enabled = true
primary->dr.topics = raw_stream.*, processed_stream, feedback_metrics
dr->primary.enabled = false

replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1

# Single-node clusters: MM2 dedicated-driver Connect internal topics must be RF=1.
primary.offset.storage.replication.factor = 1
primary.config.storage.replication.factor = 1
primary.status.storage.replication.factor = 1
dr.offset.storage.replication.factor = 1
dr.config.storage.replication.factor = 1
dr.status.storage.replication.factor = 1

# Keep identical topic names across clusters for clean failover.
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

emit.heartbeats.interval.seconds = 5
refresh.topics.interval.seconds = 10
