# App-of-apps root: ArgoCD watches this and syncs every child Application in
# infra/gitops/argocd/apps. Config Agent-generated apps land there too.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedflow-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/speedflow-gitops.git
    targetRevision: main
    path: infra/gitops/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
