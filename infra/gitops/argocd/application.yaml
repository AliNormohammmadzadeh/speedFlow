apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedflow-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/speedflow-gitops.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: speedflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
