apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: speedflow
  labels:
    app: platform-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      containers:
        - name: platform-api
          image: speedflow/platform-api:latest
          ports:
            - containerPort: 8020
          envFrom:
            - secretRef:
                name: speedflow-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8020
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: speedflow
spec:
  selector:
    app: platform-api
  ports:
    - port: 8020
      targetPort: 8020
