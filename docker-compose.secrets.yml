# Secrets backend overlay (task 4.9 local emulation): a dev-mode Vault + the
# orchestrator configured to resolve secrets from it.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d vault ai-orchestrator
#   docker exec platform-vault vault kv put secret/speedflow DEMO_SECRET=from-vault
services:
  vault:
    image: hashicorp/vault:1.15
    container_name: platform-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    command: server -dev

  ai-orchestrator:
    environment:
      SECRETS_PROVIDER: vault
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      SECRETS_VAULT_PATH: speedflow
