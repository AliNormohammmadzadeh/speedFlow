# Optional Airflow stack — use: make up-airflow
services:
  airflow-init:
    build:
      context: ./1-ingestion-edge/airflow-dags
      dockerfile: Dockerfile
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@speedflow.local || true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:adminpassword@postgres:5432/platform_db
      AIRFLOW__CORE__FERNET_KEY: RWaNo33hNvcAIwzDTZIuYyNGkyxf17fZz0ff2_rbnek=
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./1-ingestion-edge/airflow-dags/dags:/opt/airflow/dags
      - ./1-ingestion-edge/airflow-dags/plugins:/opt/airflow/plugins

  airflow:
    build:
      context: ./1-ingestion-edge/airflow-dags
      dockerfile: Dockerfile
    container_name: platform-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:adminpassword@postgres:5432/platform_db
      AIRFLOW__CORE__FERNET_KEY: RWaNo33hNvcAIwzDTZIuYyNGkyxf17fZz0ff2_rbnek=
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./1-ingestion-edge/airflow-dags/dags:/opt/airflow/dags
      - ./1-ingestion-edge/airflow-dags/plugins:/opt/airflow/plugins
      - ./config:/opt/airflow/config
    command: standalone
    restart: unless-stopped
