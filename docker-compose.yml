x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SCHEMA_REGISTRY_URL: http://schema-registry:8081
  USE_AVRO: "true"
  REDIS_URL: redis://redis:6379/0
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: adminpassword
  POSTGRES_DB: platform_db
  ELASTICSEARCH_URL: http://elasticsearch:9200
  GITOPS_REPO_PATH: /gitops

services:
  # --- Messaging Backbone ---
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: platform-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: platform-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        create_topic() {
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists "$@"
        }
        create_topic --topic raw_stream --partitions 3 --replication-factor 1
        create_topic --topic processed_stream --partitions 3 --replication-factor 1
        create_topic --topic feedback_metrics --partitions 1 --replication-factor 1
        create_topic --topic connect-configs --partitions 1 --replication-factor 1 --config cleanup.policy=compact
        create_topic --topic connect-offsets --partitions 1 --replication-factor 1 --config cleanup.policy=compact
        create_topic --topic connect-status --partitions 1 --replication-factor 1 --config cleanup.policy=compact
        echo "All topics ready"
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: platform-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "8081:8081"

  schema-init:
    image: curlimages/curl:8.5.0
    depends_on:
      schema-registry:
        condition: service_started
    volumes:
      - ./scripts/register-schemas.sh:/register-schemas.sh:ro
      - ./schemas/avro:/schemas/avro:ro
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_DIR: /schemas/avro
    entrypoint: ["/bin/sh", "/register-schemas.sh"]

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

  # --- Stream Compute ---
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-jobmanager
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-port: 8081
    volumes:
      - ./2-stream-compute/flink-ml-workers/flink-jobs:/opt/flink/usrlib

  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./2-stream-compute/flink-ml-workers/flink-jobs:/opt/flink/usrlib

  stream-processor:
    build:
      context: .
      dockerfile: 2-stream-compute/flink-ml-workers/Dockerfile.processor
    container_name: platform-stream-processor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
    restart: unless-stopped

  ml-service:
    build:
      context: ./2-stream-compute/flink-ml-workers/ml-service
      dockerfile: Dockerfile
    container_name: platform-ml-service
    depends_on:
      - redis
      - kafka
    environment:
      <<: *common-env
    ports:
      - "8090:8090"
    restart: unless-stopped

  # --- Storage ---
  postgres:
    image: postgres:15
    container_name: platform-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: platform_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: platform-search
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/opensearch/data

  kafka-connect:
    build:
      context: ./infra/kafka-connect
      dockerfile: Dockerfile
    container_name: platform-kafka-connect
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_HOST_NAME: platform-kafka-connect
      CONNECT_REST_ADVERTISED_HOST_NAME: platform-kafka-connect
      CONNECT_GROUP_ID: platform-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    volumes:
      - ./infra/kafka-connect:/connectors
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/connectors >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  connect-init:
    image: curlimages/curl:8.5.0
    container_name: platform-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./scripts/register-connectors.sh:/register-connectors.sh:ro
      - ./infra/kafka-connect:/connectors:ro
    environment:
      KAFKA_CONNECT_URL: http://platform-kafka-connect:8083
      CONNECTOR_DIR: /connectors
    entrypoint: ["/bin/sh", "/register-connectors.sh"]
    restart: "no"

  # --- Ingestion (4 scraper types) ---
  scraper-rest:
    build:
      context: .
      dockerfile: 1-ingestion-edge/scrapers/Dockerfile
    container_name: scraper-rest
    command: ["python", "-m", "shared.runner", "rest"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      <<: *common-env
      SCRAPER_TYPE: rest
    volumes:
      - ./1-ingestion-edge/scrapers/config:/app/config
    restart: unless-stopped

  scraper-websocket:
    build:
      context: .
      dockerfile: 1-ingestion-edge/scrapers/Dockerfile
    container_name: scraper-websocket
    command: ["python", "-m", "shared.runner", "websocket"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      <<: *common-env
      SCRAPER_TYPE: websocket
    volumes:
      - ./1-ingestion-edge/scrapers/config:/app/config
    restart: unless-stopped

  crawlee-worker:
    build:
      context: .
      dockerfile: 1-ingestion-edge/crawlee-service/Dockerfile
    container_name: platform-crawlee-worker
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
    restart: unless-stopped

  # Scale Crawlee workers: docker compose up -d --scale crawlee-worker=5

  # --- Platform API (multi-tenant subscriptions) ---
  platform-api:
    build:
      context: ./4-platform-api
      dockerfile: Dockerfile
    container_name: platform-api
    ports:
      - "8020:8020"
    depends_on:
      postgres:
        condition: service_healthy
      ai-orchestrator:
        condition: service_started
      redis:
        condition: service_started
    environment:
      <<: *common-env
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      PLANS_CONFIG: /app/config/subscriptions/plans.yaml
    volumes:
      - ./config/subscriptions:/app/config/subscriptions:ro
    restart: unless-stopped

  scraper-selenium:
    build:
      context: .
      dockerfile: 1-ingestion-edge/scrapers/Dockerfile
    container_name: scraper-selenium
    command: ["python", "-m", "shared.runner", "selenium"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      <<: *common-env
      SCRAPER_TYPE: selenium
    volumes:
      - ./1-ingestion-edge/scrapers/config:/app/config
    restart: unless-stopped

  # --- AI Intelligence Layer ---
  ai-orchestrator:
    build:
      context: ./0-ai-intelligence
      dockerfile: Dockerfile
    container_name: ai-orchestrator
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - kafka
    environment:
      <<: *common-env
    volumes:
      - ./config:/app/config
      - ./infra:/app/infra
      - gitops-output:/gitops
    restart: unless-stopped

  # --- End-Use Applications ---
  aggregator-backend:
    build:
      context: ./3-serving-api
      dockerfile: aggregator-backend/Dockerfile
    container_name: app-aggregator
    ports:
      - "8010:8010"
    depends_on:
      - postgres
      - elasticsearch
      - ai-orchestrator
    environment:
      <<: *common-env
      APP_NAME: accommodation_aggregator
    restart: unless-stopped

  trading-bot:
    build:
      context: ./3-serving-api
      dockerfile: trading-bot/Dockerfile
    container_name: app-trading-bot
    ports:
      - "8011:8011"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      stream-processor:
        condition: service_started
      postgres:
        condition: service_healthy
      ai-orchestrator:
        condition: service_started
    environment:
      <<: *common-env
      APP_NAME: trading_bot
    restart: unless-stopped

  auditing-service:
    build:
      context: ./3-serving-api
      dockerfile: auditing-service/Dockerfile
    container_name: app-auditing
    ports:
      - "8012:8012"
    depends_on:
      - postgres
      - ai-orchestrator
    environment:
      <<: *common-env
      APP_NAME: auditing_service
    restart: unless-stopped

  dashboard:
    build:
      context: ./3-serving-api
      dockerfile: dashboard/Dockerfile
    container_name: app-dashboard
    ports:
      - "8013:8013"
    depends_on:
      - elasticsearch
      - ai-orchestrator
    environment:
      <<: *common-env
      APP_NAME: meta_dashboard
    restart: unless-stopped

  marketplace:
    build:
      context: ./3-serving-api
      dockerfile: marketplace/Dockerfile
    container_name: app-marketplace
    ports:
      - "8014:8014"
    depends_on:
      - postgres
      - ai-orchestrator
    environment:
      <<: *common-env
      APP_NAME: data_marketplace
    volumes:
      - ./config/business/governance.yaml:/app/config/governance.yaml:ro
    restart: unless-stopped

  ui-portal:
    build:
      context: .
      dockerfile: 5-ui/Dockerfile
    container_name: speedflow-portal
    ports:
      - "8030:8030"
    depends_on:
      platform-api:
        condition: service_started
      ai-orchestrator:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PLATFORM_API_URL: http://platform-api:8020
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      AGGREGATOR_URL: http://app-aggregator:8010
      TRADING_BOT_URL: http://app-trading-bot:8011
      AUDITING_URL: http://app-auditing:8012
      DASHBOARD_URL: http://app-dashboard:8013
      MARKETPLACE_URL: http://app-marketplace:8014
      ML_SERVICE_URL: http://platform-ml-service:8090
      KAFKA_CONNECT_URL: http://platform-kafka-connect:8083
      FLINK_URL: http://flink-jobmanager:8081
      USE_DOCKER_LOGS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  kafka-data:
  redis-data:
  postgres-data:
  elastic-data:
  gitops-output:
